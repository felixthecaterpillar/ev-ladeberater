<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesla Login — EV Ladeberater</title>
<style>
  body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:32px;max-width:400px;width:100%;text-align:center}
  .icon{width:48px;height:48px;margin:0 auto 16px;background:rgba(88,166,255,.1);border-radius:12px;display:flex;align-items:center;justify-content:center}
  h2{font-size:18px;font-weight:500;margin-bottom:8px}
  p{font-size:13px;color:#8b949e;line-height:1.6;margin-bottom:20px}
  .status{font-size:13px;padding:10px 16px;border-radius:8px;margin-bottom:16px}
  .loading{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.2);color:#58a6ff}
  .success{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.2);color:#3fb950}
  .error{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.2);color:#f85149}
  .dots{display:inline-flex;gap:4px;margin-left:6px}
  .dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 1.2s ease-in-out infinite}
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="1.5">
      <path d="M12 3l9 4.5v3c0 6-3.75 9.75-9 12C6.75 20.25 3 16.5 3 10.5v-3L12 3z"/>
      <path d="M9 12l2 2 4-4" stroke="#3fb950" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h2>Tesla Verbindung</h2>
  <p>Login wird verarbeitet…</p>
  <div class="status loading" id="status">
    Weiterleitung<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
  </div>
</div>
<script>
function setStatus(type, msg){
  const el=document.getElementById('status');
  el.className='status '+type;
  el.innerHTML=msg;
}

(function(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code');
  const state=params.get('state');
  const error=params.get('error');

  if(error){
    setStatus('error','Login abgebrochen: '+(params.get('error_description')||error));
    return;
  }
  if(!code){
    setStatus('error','Kein Authorisierungs-Code erhalten.');
    return;
  }
  const savedState=localStorage.getItem('tesla_oauth_state');
  if(state!==savedState){
    setStatus('error','Sicherheitsfehler: State stimmt nicht überein.');
    return;
  }

  setStatus('loading','Login erfolgreich — leite weiter<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>');

  // Redirect back to index.html with code + state as query params
  const base=window.location.href.replace('/callback.html','').replace(/\?.*$/,'');
  setTimeout(()=>{
    window.location.href=base+'/index.html?code='+encodeURIComponent(code)+'&state='+encodeURIComponent(state);
  }, 600);
})();
</script>
</body>
</html>
